<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-64 bg-slate-900 text-white flex flex-col shadow-xl">
            <div class="p-5 text-xl font-bold tracking-wider border-b border-slate-800 flex items-center gap-3">
                <i class="fa-solid fa-box-open text-indigo-400"></i> ShopAdmin
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-indigo-600 text-white font-medium transition">
                    <i class="fa-solid fa-tags w-5"></i> Products
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-8">
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Products</h1>
                    <p class="text-sm text-gray-500">Manage your e-commerce catalog inventory</p>
                </div>
                <button onclick="openModal()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white px-5 py-2.5 rounded-lg font-medium shadow transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add Product
                </button>
            </header>

            <section class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-400 uppercase">Total Products</p>
                        <h3 id="stat-total" class="text-2xl font-bold mt-1">0</h3>
                    </div>
                    <div class="p-3 bg-indigo-50 text-indigo-600 rounded-lg"><i class="fa-solid fa-boxes-stacked text-xl"></i></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-400 uppercase">Low Stock Alert</p>
                        <h3 id="stat-low-stock" class="text-2xl font-bold mt-1 text-amber-600">0</h3>
                    </div>
                    <div class="p-3 bg-amber-50 text-amber-600 rounded-lg"><i class="fa-solid fa-triangle-exclamation text-xl"></i></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-400 uppercase">Out of Stock</p>
                        <h3 id="stat-out" class="text-2xl font-bold mt-1 text-rose-600">0</h3>
                    </div>
                    <div class="p-3 bg-rose-50 text-rose-600 rounded-lg"><i class="fa-solid fa-circle-xmark text-xl"></i></div>
                </div>
            </section>

            <div class="mb-4 flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="search-input" oninput="handleSearchFilter()" placeholder="Search products by name..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition text-sm">
                </div>
                <select id="filter-category" onchange="handleSearchFilter()" class="px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition text-sm bg-white">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Apparel">Apparel</option>
                    <option value="Home & Kitchen">Home & Kitchen</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold uppercase tracking-wider text-gray-500 select-none">
                                <th class="p-4 w-20">Image</th>
                                <th class="p-4 cursor-pointer hover:bg-gray-100 transition" onclick="handleSort('name')">
                                    Product Name <i id="sort-icon-name" class="fa-solid fa-sort ml-1 text-gray-400"></i>
                                </th>
                                <th class="p-4 cursor-pointer hover:bg-gray-100 transition" onclick="handleSort('category')">
                                    Category <i id="sort-icon-category" class="fa-solid fa-sort ml-1 text-gray-400"></i>
                                </th>
                                <th class="p-4 cursor-pointer hover:bg-gray-100 transition" onclick="handleSort('price')">
                                    Price <i id="sort-icon-price" class="fa-solid fa-sort ml-1 text-gray-400"></i>
                                </th>
                                <th class="p-4 cursor-pointer hover:bg-gray-100 transition" onclick="handleSort('stock')">
                                    Stock <i id="sort-icon-stock" class="fa-solid fa-sort ml-1 text-gray-400"></i>
                                </th>
                                <th class="p-4 cursor-pointer hover:bg-gray-100 transition" onclick="handleSort('status')">
                                    Status <i id="sort-icon-status" class="fa-solid fa-sort ml-1 text-gray-400"></i>
                                </th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body" class="divide-y divide-gray-200 text-sm">
                            </tbody>
                    </table>
                </div>
                <div id="empty-state" class="hidden p-8 text-center text-gray-500">
                    <i class="fa-solid fa-folder-open text-4xl mb-2 text-gray-300"></i>
                    <p>No products found matching your criteria.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="product-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h2 id="modal-title" class="text-xl font-bold text-gray-900">Add New Product</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
             
            <form id="product-form" onsubmit="saveProduct(event)" class="overflow-y-auto p-6 space-y-4 flex-1" novalidate>
                <input type="hidden" id="product-id">
                 
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Product Name *</label>
                    <input type="text" id="prod-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                    <p class="error-msg text-rose-500 text-xs mt-1 hidden"></p>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Category *</label>
                    <select id="prod-category" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                        <option value="">Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Apparel">Apparel</option>
                        <option value="Home & Kitchen">Home & Kitchen</option>
                        <option value="Beauty">Beauty</option>
                        <option value="Sports">Sports</option>
                    </select>
                    <p class="error-msg text-rose-500 text-xs mt-1 hidden"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Price ($) *</label>
                        <input type="number" id="prod-price" step="0.01" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                        <p class="error-msg text-rose-500 text-xs mt-1 hidden"></p>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Stock Quantity *</label>
                        <input type="number" id="prod-stock" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                        <p class="error-msg text-rose-500 text-xs mt-1 hidden"></p>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Product Image</label>
                    <div class="flex items-center gap-4 border border-dashed border-gray-300 p-3 rounded-lg bg-gray-50">
                        <label class="cursor-pointer bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded-md text-xs font-medium hover:bg-gray-50 shadow-sm transition">
                            Browse File
                            <input type="file" id="prod-image" accept="image/*" class="hidden" onchange="previewImage(event)">
                        </label>
                        <div id="image-preview-container" class="w-12 h-12 rounded border bg-white flex items-center justify-center overflow-hidden relative group">
                            <img id="image-view" class="w-full h-full object-cover hidden">
                            <i id="image-placeholder" class="fa-solid fa-image text-gray-300 text-lg"></i>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-200 flex justify-end gap-3 sticky bottom-0 bg-white">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 text-gray-700 transition">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium shadow transition">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 z-50 transform translate-y-10 opacity-0 transition-all duration-300 bg-slate-900 text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 pointer-events-none text-sm">
        <i id="toast-icon" class="fa-solid text-emerald-400"></i>
        <span id="toast-message">Action successful</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
